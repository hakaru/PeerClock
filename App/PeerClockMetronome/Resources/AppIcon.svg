<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glowStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="28" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="dotGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#0d1428"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#00cccc" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#00cccc" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="230" fill="url(#bgGrad)"/>
  <rect width="1024" height="1024" rx="230" fill="url(#centerGlow)"/>

  <!-- Coords: offset=60, scale=904 -->
  <!-- Beat1(494,892) Beat2(331,801) WP(494,856) Beat3(765,711) Beat4(512,223) -->

  <!-- Outer glow (full path, uniform) -->
  <path d="M 494,892 C 376,404 404,584 331,801 C 259,919 15,512 494,856 C 648,892 711,828 765,711 C 765,874 512,602 512,223 C 494,196 494,512 494,892 Z"
        fill="none" stroke="#00e5ff" stroke-opacity="0.10" stroke-width="32"
        stroke-linecap="round" stroke-linejoin="round"
        filter="url(#glowStrong)"/>

  <!-- Per-segment strokes with pen-like width variation -->
  <!-- Downstrokes thick, upstrokes thin -->

  <!-- Seg 4→1: vertical drop (downstroke) - thickest -->
  <path d="M 512,223 C 494,196 494,512 494,892"
        fill="none" stroke="#00e5ff" stroke-opacity="0.5" stroke-width="9"
        stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 512,223 C 494,196 494,512 494,892"
        fill="none" stroke="#80f0ff" stroke-opacity="0.75" stroke-width="4.5"
        stroke-linecap="round"/>

  <!-- Seg 1→2: arc up then down - medium -->
  <path d="M 494,892 C 376,404 404,584 331,801"
        fill="none" stroke="#00e5ff" stroke-opacity="0.5" stroke-width="7"
        stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 494,892 C 376,404 404,584 331,801"
        fill="none" stroke="#80f0ff" stroke-opacity="0.7" stroke-width="3.5"
        stroke-linecap="round"/>

  <!-- Seg 2→WP: left loop - medium-thick -->
  <path d="M 331,801 C 259,919 15,512 494,856"
        fill="none" stroke="#00e5ff" stroke-opacity="0.5" stroke-width="8"
        stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 331,801 C 259,919 15,512 494,856"
        fill="none" stroke="#80f0ff" stroke-opacity="0.7" stroke-width="4"
        stroke-linecap="round"/>

  <!-- Seg WP→3: sweep right and up - thin -->
  <path d="M 494,856 C 648,892 711,828 765,711"
        fill="none" stroke="#00e5ff" stroke-opacity="0.5" stroke-width="5"
        stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 494,856 C 648,892 711,828 765,711"
        fill="none" stroke="#80f0ff" stroke-opacity="0.65" stroke-width="2.5"
        stroke-linecap="round"/>

  <!-- Seg 3→4: hanging curve upstroke - thinnest -->
  <path d="M 765,711 C 765,874 512,602 512,223"
        fill="none" stroke="#00e5ff" stroke-opacity="0.5" stroke-width="4"
        stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 765,711 C 765,874 512,602 512,223"
        fill="none" stroke="#80f0ff" stroke-opacity="0.6" stroke-width="2"
        stroke-linecap="round"/>

  <!-- Beat points -->
  <!-- Beat 1 (downbeat) - brightest -->
  <circle cx="494" cy="892" r="16" fill="#00e5ff" opacity="0.3" filter="url(#dotGlow)"/>
  <circle cx="494" cy="892" r="9" fill="#ffffff" opacity="0.9"/>

  <!-- Beat 2 -->
  <circle cx="331" cy="801" r="12" fill="#00e5ff" opacity="0.2" filter="url(#dotGlow)"/>
  <circle cx="331" cy="801" r="6" fill="#80f0ff" opacity="0.6"/>

  <!-- Beat 3 -->
  <circle cx="765" cy="711" r="12" fill="#00e5ff" opacity="0.2" filter="url(#dotGlow)"/>
  <circle cx="765" cy="711" r="6" fill="#80f0ff" opacity="0.6"/>

  <!-- Beat 4 -->
  <circle cx="512" cy="223" r="12" fill="#00e5ff" opacity="0.2" filter="url(#dotGlow)"/>
  <circle cx="512" cy="223" r="6" fill="#80f0ff" opacity="0.6"/>

</svg>
