name: PeerClockMetronome
options:
  bundleIdPrefix: net.hakaru
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

packages:
  PeerClock:
    path: ../..

targets:
  PeerClockMetronome:
    type: application
    platform: iOS
    sources:
      - Sources
    resources:
      - Resources
    dependencies:
      - package: PeerClock
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: PeerClock Metronome
        UILaunchScreen: {}
        UIRequiredDeviceCapabilities: [arm64]
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        NSLocalNetworkUsageDescription: PeerClock Metronome uses local network to sync with nearby devices
        NSMotionUsageDescription: PeerClock Metronome reads motion data to detect conducting gestures for real-time tempo control
        NSBonjourServices:
          - _peerclock._tcp
          - _peerclock._udp
    settings:
      base:
        DEVELOPMENT_TEAM: K38MBRNKAT
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: net.hakaru.PeerClockMetronome
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_STRICT_CONCURRENCY: complete
        SWIFT_VERSION: "6.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
