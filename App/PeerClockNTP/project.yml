name: PeerClockNTP
options:
  bundleIdPrefix: net.hakaru
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

packages:
  PeerClock:
    path: ../..

targets:
  PeerClockNTP:
    type: application
    platform: iOS
    sources:
      - Sources
    resources:
      - Resources
    dependencies:
      - package: PeerClock
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        DEVELOPMENT_TEAM: K38MBRNKAT
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: net.hakaru.PeerClockNTP
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_VALUES: >-
          CFBundleDisplayName=PeerClock NTP;
          UILaunchScreen={};
          UIRequiredDeviceCapabilities=[arm64];
          UISupportedInterfaceOrientations=[UIInterfaceOrientationPortrait];
          NSLocalNetworkUsageDescription=PeerClock NTP uses local network to discover and sync with nearby devices;
          NSBonjourServices=[_peerclock._tcp,_peerclock._udp]
        SWIFT_STRICT_CONCURRENCY: complete
        SWIFT_VERSION: "6.0"
